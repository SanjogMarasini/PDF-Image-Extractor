<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Image & PDF Exporter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>PDF Page Extractor</h1>
    <p class="subtitle">
      Upload a PDF and download pages as images or PDFs.
    </p>

    <div class="upload-box">
      <input type="file" id="pdfInput" accept="application/pdf">
      <button id="extractBtn">Extract Pages</button>
    </div>

    <div class="controls">
      <button id="downloadAllImagesBtn" disabled>
        Download All Images (.zip)
      </button>

      <button id="downloadAllPdfBtn" disabled>
        Download All Pages as PDF
      </button>
    </div>

    <div id="status"></div>
    <div id="gallery"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
